name: Intelligence Daily Pipeline

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch intelligence data from Worker
        run: node scripts/fetch-intelligence-data.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/api/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily intelligence data update [data]"
            git push
          fi